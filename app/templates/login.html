{% extends "base.html" %}

{% block title %}Login | MockCBT{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h2>Login</h2>
        <p>Continue your CBT preparation.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <input type="text" name="identifier" class="form-control mb-3" placeholder="Email or phone number" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-gold w-100">Login</button>
        </form>

        <p class="auth-link">
            Don’t have an account?
            <a href="{{ url_for('auth.register') }}">Create account</a>
        </p>

        <p class="auth-link">
            <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
        </p>
    </div>
</section>
{% endblock %}
