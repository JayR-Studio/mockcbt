{% extends "base.html" %}

{% block title %}Forgot Password | MockCBT{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <p class="hero-label">ACCOUNT RECOVERY</p>
        <h2>Forgot Password?</h2>
        <p>Enter the email or phone number you used to register.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <input type="text"
                   name="identifier"
                   class="form-control mb-3"
                   placeholder="Email or phone number"
                   required>

            <button class="btn btn-gold w-100">
                Send Reset Link
            </button>
        </form>

        <p class="auth-link">
            Remember your password?
            <a href="{{ url_for('auth.login') }}">Login</a>
        </p>
    </div>
</section>
{% endblock %}
